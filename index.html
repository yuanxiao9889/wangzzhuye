<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="OOPII Infinite Canvas parallax landing experience."
    />
    <title>OOPII Infinite Canvas</title>
    <link rel="preload" href="./assets/space-bg.png" as="image" />
    <link rel="preload" href="./assets/figure.png" as="image" />
    <link rel="preload" href="./assets/title-main.png" as="image" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="experience" aria-label="OOPII Infinite Canvas">
      <section class="screen hero-screen is-active" data-screen="0">
        <div class="stage" aria-hidden="true">
          <div class="frame"></div>
          <div class="layer bg-layer" data-depth="-0.18">
            <img src="./assets/space-bg.png" alt="" class="space-bg" />
          </div>
          <div class="bg-vignette"></div>
          <div class="starfield" data-depth="-0.14"></div>

          <div class="layer figure-layer" data-depth="0.62">
            <div class="figure-float">
              <img src="./assets/figure.png" alt="" class="figure figure-ghost ghost-far" />
              <img src="./assets/figure.png" alt="" class="figure figure-ghost ghost-near" />
              <img src="./assets/figure.png" alt="" class="figure figure-main" />
            </div>
          </div>

          <div class="layer title-layer" data-depth="-0.52">
            <img src="./assets/title-main.png" alt="OOPII 无限画布" class="title-main" />
          </div>

          <nav class="hero-nav hero-piece" aria-label="OOPII navigation">
            <button class="menu-grid" type="button" aria-label="Open menu">
              <span></span><span></span><span></span>
              <span></span><span></span><span></span>
              <span></span><span></span><span></span>
            </button>
            <img src="./assets/brand-logo.png" alt="OOPII Infinite Canvas" class="brand-logo" />
            <img src="./assets/top-mark.png" alt="OOPII" class="top-mark" />
            <img src="./assets/limitless.png" alt="Limitless possibilities" class="limitless" />
          </nav>

          <div class="hero-hud hero-piece" aria-hidden="true">
            <img src="./assets/info-left.png" alt="" class="info-left" data-depth="0.2" />
            <img src="./assets/orb-card.png" alt="" class="orb-card" data-depth="0.26" />
            <img src="./assets/engine-card.png" alt="" class="engine-card" data-depth="0.22" />
            <div class="left-progress">
              <span></span>
            </div>
            <div class="right-mark"></div>
          </div>

          <button class="explore hero-piece" type="button" aria-label="Explore next canvas">
            <span class="explore-icon"></span>
            <span class="explore-text">EXPLORE NOW</span>
          </button>
        </div>
      </section>

      <section class="screen next-screen" data-screen="1" aria-label="Next canvas preview">
        <div class="next-content">
          <span>OOPII ENGINE</span>
          <h2>Next Canvas</h2>
          <p>Scroll back to return. This section is ready for the next screen.</p>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
